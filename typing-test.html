<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Typing Test</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: rgb(201, 217, 255);">

<div class="container mt-5">
    <h3 class="text-center" style="font-style: normal; font-family:'Georgia', Times New Roman, Times, serif;">Typing Test</h3>
    <!--<p class="text-center">Type the text below as fast and accurately as you can.</p>-->

    <!-- Difficulty Selection -->
    <div class="mb-3 text-center">
        <label for="difficulty" class="form-label">Select Difficulty:</label>
        <select id="difficulty" class="form-select w-25 mx-auto">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>

    <!-- Paragraph Display -->
    <div class="card p-3 mb-3">
        <p id="text-to-type">Your paragraph will appear here.</p>
    </div>

    <!-- Timer -->
    <div class="mb-3 text-center">
    <label for="timeSelect" class="form-label">Select Test Time:</label>
    
    <select id="timeSelect" class="form-select w-25 mx-auto">
        <option value="30">30 Seconds</option>
        <option value="60" selected>60 Seconds</option>
        <option value="120">120 Seconds</option>
        <option value="180">180 Seconds</option>
    </select>
<div class="text-center mb-3">
    <h5 id="timer" class="fw-bold text-danger" style="margin: 20px 0;">
        Time Left: 0s
    </h5>
</div>

</div>

    <!-- Typing Area -->
    <textarea id="user-input" class="form-control mb-3" rows="3" placeholder="Start typing here..." disabled></textarea>

    <!-- Buttons -->
    <div class="text-center mt-3">
        <button class="btn btn-primary me-2" onclick="startTest()">Start Test</button>
        <button class="btn btn-success" onclick="finishTest()">Finish Test</button>
    </div>

    <!-- Result -->
    <div id="result" class="mt-4 text-center"></div>
</div>

<script src="js/typing.js"></script>
</body>
</html>
