<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color:beige;">

<div class="container mt-5 col-md-4">
  <h3 class="text-center mb-4">Login</h3>

  <input id="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-2" placeholder="Password">
  <button class="btn btn-success w-100" onclick="login()">Login</button>

  <p class="mt-3 text-center">Don't have an account? <a href="register.html">Register</a></p>
</div>

<script src="js/auth.js"></script>
</body>
</html>
